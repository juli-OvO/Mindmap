<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>synthesis</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div id="canvas-container">
  <div id="canvas">
    <svg id="conn-svg" style="position:absolute;top:0;left:0;width:1px;height:1px;overflow:visible;pointer-events:none;">
      <defs>
        <!-- Arrow markers match the three canonical relationship types -->
        <marker id="arrow-parallel"    markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="rgba(139,115,85,0.6)"/></marker>
        <marker id="arrow-leads_to"    markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="rgba(80,120,100,0.7)"/></marker>
        <marker id="arrow-contradicts" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="rgba(160,80,80,0.7)"/></marker>
      </defs>
    </svg>
  </div>
</div>

<input type="text" id="project-title-input" placeholder="Untitled Project" autocomplete="off" spellcheck="false">

<div id="hint">double-click to add a fragment</div>

<div id="filter-bar" aria-label="Graph filters">
  <label>
    type
    <select id="type-filter">
      <option value="__all">All</option>
    </select>
  </label>
  <label>
    tag
    <select id="tag-filter">
      <option value="__all">All</option>
    </select>
  </label>
</div>

<!-- Input controls — bottom center -->
<div id="input-controls">
  <button id="voice-btn">speak</button>
  <span class="ic-sep"> · </span>
  <button id="dump-btn">text</button>
</div>

<div id="input-status" class="input-status"></div>

<!-- Text dump panel -->
<div id="text-dump-panel">
  <div class="tdp-label">paste or write</div>
  <textarea placeholder="dump your thoughts here..."></textarea>
  <div class="tdp-footer">
    <button id="dump-cancel">cancel</button>
    <button id="dump-submit">extract →</button>
  </div>
</div>

<div id="io-controls">
  <button id="export-btn">export</button>
  <span class="ic-sep"> · </span>
  <button id="import-btn">import</button>
  <span class="ic-sep"> · </span>
  <button id="clear-btn">clear all</button>
  <span class="ic-sep"> · </span>
  <button id="transcripts-btn">transcripts</button>
  <input type="file" id="import-file" accept=".json" style="display:none">
</div>

<div id="transcript-panel">
  <div id="tp-header">
    <span>transcripts</span>
    <button id="tp-close">×</button>
  </div>
  <div id="tp-body">
    <div id="tp-session-list"></div>
    <div id="tp-content">
      <div id="tp-meta"></div>
      <div id="tp-text"></div>
    </div>
  </div>
</div>

<div id="edit-panel"></div>
<div id="type-picker"></div>
<div id="context-menu"></div>

<button id="suggest-btn">suggest directions</button>
<button id="synth-btn">synthesize →</button>

<div id="synth-overlay">
  <div id="synth-popup"></div>
</div>

<div id="synth-output"></div>

<!-- Critique panel — shown after suggest directions, separate from graph -->
<div id="critique-panel" style="display:none"></div>

<!-- Transcript viewer overlay -->
<div id="transcript-overlay">
  <div id="transcript-popup">
    <div id="transcript-meta"></div>
    <div id="transcript-body"></div>
    <div id="transcript-footer">
      <button id="transcript-close">close</button>
    </div>
  </div>
</div>

<!-- Patch review overlay -->
<div id="patch-overlay">
  <div id="patch-popup">
    <div id="patch-body">
      <div id="patch-left">
        <div class="pp-label">transcript</div>
        <div id="patch-transcript-text"></div>
      </div>
      <div id="patch-right">
        <div class="pp-label">proposed changes</div>
        <div id="patch-sections"></div>
      </div>
    </div>
    <div id="patch-footer">
      <button id="patch-cancel">cancel</button>
      <button id="patch-accept">commit →</button>
    </div>
  </div>
</div>

<div id="session-timeline"></div>

<!-- Thinking state label — subtle top-right readout, auto-classified from graph -->
<div id="thinking-state-label"></div>

<!-- Live voice transcription overlay -->
<div id="voice-transcript-overlay">
  <div id="voice-transcript-text"></div>
  <div id="vto-controls">
    <button id="vto-cancel">cancel</button>
    <button id="vto-send">send →</button>
  </div>
</div>

<script src="data.js"></script>
<script src="terrain.js"></script>
<script src="particles.js"></script>
<script src="synthesis.js"></script>
<script src="patterns.js"></script>
<script src="app.js"></script>
<!-- Graph analysis + thinking state (local, no API) -->
<script src="js/analysis/graphAnalysis.js"></script>
<script src="js/analysis/classifyThinkingState.js"></script>
<!-- Semantic layout -->
<script src="js/layout/layoutPresets.js"></script>
<script src="js/layout/applySemanticLayout.js"></script>
<script src="input.js"></script>
</body>
</html>
